abstract: 'Subject training is crucial for acquiring brain-computer interface (BCI) control. Here, we show that a decoder
  trained on the data of a single expert is readily transferable to inexperienced users via domain adaptation techniques allowing
  calibration-free BCI training. We introduce two real-time frameworks: Generic Recentering (GR) through unsupervised adaptation
  and Personally Assisted Recentering (PAR) that extends GR by employing supervised recalibration. We evaluated our frameworks
  on 18 healthy naive subjects over five online sessions, who operated a synchronous bar task and a car racing game. Our frameworks
  promoted subjects'' ability to acquire individual BCI skills.'
