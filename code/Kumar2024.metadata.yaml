file_format: GDF
methodology: '18 BCI-naive subjects participated in 6 sessions (1 offline + 5 online) on separate days. Each session comprised
  bar-feedback MI runs and car racing games. Bar runs had 20 trials (10 per class) with cue-based left/right hand MI. EEG
  recorded at 512 Hz with 22 EEG + 3 EOG channels using ANT Neuro eego mylab. Two groups: GR (N=9, unsupervised) and PAR (N=9,
  supervised recalibration). Features: covariance matrices in 8-30 Hz band classified with Riemannian MDM decoder.'
